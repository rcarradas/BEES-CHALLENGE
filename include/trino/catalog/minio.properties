connector.name=hive

# S3 / MinIO Configuration
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.aws-access-key=admin
s3.aws-secret-key=password
s3.region=us-east-1
s3.path-style-access=true

# Metastore Configuration (Usando o próprio MinIO para guardar metadados)
hive.metastore=file
# Isso criará uma pasta oculta no bucket bronze para gerenciar o catálogo
hive.metastore.catalog.dir=s3a://bronze-layer/.trino-metastore
