version: "3.1"
services:
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password
    command: server /data --console-address ":9001"
    networks:
      - airflow

  # Serviço para criar os buckets automaticamente
  create-buckets:
    image: minio/mc
    depends_on:
      - minio
    networks:
      - airflow
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local_minio http://minio:9000 admin password) do echo 'Aguardando MinIO...' && sleep 1; done;
      /usr/bin/mc mb local_minio/bronze-layer --ignore-existing;
      /usr/bin/mc mb local_minio/silver-layer --ignore-existing;
      /usr/bin/mc mb local_minio/gold-layer --ignore-existing;
      exit 0;
      "